<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multilife Sports | Elite Match Intelligence</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --neon-orange: #ff4d00;
            --deep-black: #050505;
            --surface-gray: #121212;
            --border-color: #2a2a2a;
            --text-silver: #cfcfcf;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--deep-black);
            color: white;
            margin: 0;
            overflow-x: hidden;
        }

        /* Animated background element */
        body::before {
            content: "";
            position: fixed;
            top: -10%;
            right: -10%;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(255, 77, 0, 0.1) 0%, transparent 70%);
            z-index: -1;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            text-align: center;
            padding: 100px 0 60px;
        }

        .brand {
            font-size: 0.9rem;
            letter-spacing: 5px;
            text-transform: uppercase;
            color: var(--neon-orange);
            margin-bottom: 10px;
            display: block;
        }

        h1 {
            font-size: clamp(2.5rem, 8vw, 4rem);
            margin: 0;
            font-weight: 900;
            line-height: 1.1;
        }

        h1 span {
            -webkit-text-stroke: 1px white;
            color: transparent;
        }

        .hero-desc {
            color: var(--text-silver);
            font-size: 1.2rem;
            max-width: 650px;
            margin: 20px auto 40px;
        }

        .cta-group {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .btn-main {
            background: var(--neon-orange);
            color: white;
            padding: 18px 40px;
            text-decoration: none;
            font-weight: 800;
            text-transform: uppercase;
            clip-path: polygon(10% 0, 100% 0, 90% 100%, 0% 100%);
            transition: 0.3s;
            cursor: pointer;
            border: none;
        }

        .btn-main:hover {
            transform: skew(-2deg) scale(1.05);
            filter: brightness(1.2);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 30px;
            margin-top: 80px;
        }

        .card {
            background: var(--surface-gray);
            border: 1px solid var(--border-color);
            padding: 40px;
            position: relative;
            transition: 0.4s;
        }

        .card:hover {
            border-color: var(--neon-orange);
            transform: translateY(-10px);
        }

        .card i {
            font-size: 2.5rem;
            margin-bottom: 20px;
            color: var(--neon-orange);
        }

        .card h3 {
            font-size: 1.5rem;
            margin-bottom: 15px;
        }

        .card p {
            color: var(--text-silver);
            line-height: 1.7;
        }

        /* --- Privacy Policy Modal --- */
        #privacy-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(5, 5, 5, 0.98);
            z-index: 1000;
            overflow-y: auto;
            padding: 60px 20px;
            box-sizing: border-box;
        }

        .policy-container {
            max-width: 800px;
            margin: 0 auto;
        }

        .policy-card {
            background: var(--surface-gray);
            border: 1px solid var(--border-color);
            padding: 40px;
        }

        .close-btn {
            color: var(--neon-orange);
            text-transform: uppercase;
            font-weight: 900;
            cursor: pointer;
            display: inline-block;
            margin-bottom: 20px;
            letter-spacing: 2px;
        }

        /* --- Footer Styling --- */
        footer {
            margin-top: 100px;
            padding: 60px 0;
            border-top: 1px solid var(--border-color);
            text-align: center;
        }

        .footer-nav {
            margin: 20px 0;
        }

        .footer-nav a {
            color: var(--text-silver);
            text-decoration: none;
            margin: 0 15px;
            font-size: 0.85rem;
            transition: 0.3s;
            cursor: pointer;
